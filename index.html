<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RK Album Designing</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#0b1c3f;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
color:#f7c948;
}

nav a{
color:white;
text-decoration:none;
margin:0 12px;
font-weight:bold;
}

.hero{
padding:70px 20px;
text-align:center;
background:white;
}

.hero h2{
font-size:42px;
color:#0b1c3f;
}

.hero p{
margin-top:15px;
font-size:20px;
color:#666;
}

.btn{
display:inline-block;
margin-top:25px;
padding:14px 28px;
background:#25D366;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.categories{
padding:60px 20px;
}

.categories h2{
text-align:center;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:40px;
text-align:center;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
font-size:22px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

footer{
background:#0b1c3f;
color:white;
text-align:center;
padding:20px;
margin-top:50px;
}
</style>

</head>

<body>

<header>
<h1>RK Album Designing</h1>

<nav>
<a href="#">Home</a>
<a href="#">Wedding</a>
<a href="#">Birthday</a>
<a href="#">Baby</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">
<h2>We Design Your Memories</h2>
<p>Premium Album Designing Services</p>

<a class="btn" href="https://wa.me/918886496535">WhatsApp Us</a>

</section>

<section class="categories">

<h2>Categories</h2>

<div class="grid">

<div class="card">Wedding</div>

<div class="card">Pre Wedding</div>

<div class="card">Birthday</div>

<div class="card">Baby Shoot</div>

<div class="card">Saree Ceremony</div>

<div class="card">Events</div>

</div>

</section>

<footer>

© RK Album Designing

</footer>

</body>
</html>
