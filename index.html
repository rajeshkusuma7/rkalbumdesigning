<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RK Album Designing</title>

<style>

body{
margin:0;
font-family:Arial;
background:#071a3d;
color:#fff;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#06142f;
}

.logo{
font-size:26px;
font-weight:bold;
color:#f7c948;
}

/* HERO */
.hero{
text-align:center;
padding:40px 20px;
}

.hero img{
width:100%;
max-width:1000px;
border-radius:15px;
}

.hero h1{
margin-top:20px;
font-size:32px;
}

.btn{
display:inline-block;
margin-top:15px;
padding:12px 25px;
background:#25D366;
color:white;
text-decoration:none;
border-radius:25px;
font-weight:bold;
}

/* SERVICES */
.categories{
padding:40px 20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:#102b5e;
padding:20px;
border-radius:10px;
font-weight:bold;
}

/* FOOTER */
footer{
background:#06142f;
padding:25px;
text-align:center;
margin-top:40px;
}

.social-links{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-top:15px;
}

.social-links a{
background:#102b5e;
color:white;
padding:10px 15px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.social-links a:hover{
background:#f7c948;
color:#071a3d;
}

</style>

</head>

<body>

<header>
<div class="logo">RK Album Designing</div>
</header>

<section class="hero">

<img src="images/banner.png">

<h1>We Design Your Memories</h1>

<a class="btn" href="https://wa.me/918886496535">WhatsApp Us</a>

</section>

<section class="categories">

<h2>Our Services</h2>

<div class="grid">

<div class="card">Wedding</div>
<div class="card">Birthday</div>
<div class="card">Engagement</div>
<div class="card">Baby Shower</div>
<div class="card">Events</div>

</div>

</section>

<footer>

<p>RK Album Designing</p>
<p>📞 8886496535</p>
<p>📧 rajeshkusuma7@gmail.com</p>

<div class="social-links">

<a href="https://wa.me/918886496535">WhatsApp</a>
<a href="https://instagram.com/rajesh_kusuma7">Instagram</a>

</div>

</footer>

</body>
</html>
