<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RK Album Designing</title>

<style>

body{
margin:0;
font-family:Arial;
background:#061a3a;
color:white;
}

header{
display:flex;
align-items:center;
gap:10px;
padding:12px 15px;
background:#081f44;
color:#f7c948;
font-size:20px;
font-weight:bold;
}

header img{
width:40px;
height:40px;
object-fit:contain;
}

.hero{
text-align:center;
padding:15px;
}

.hero img{
width:90%;
max-width:1000px;
height:auto;
border-radius:10px;
display:block;
margin:auto;
}

.hero h1{
margin-top:10px;
font-size:28px;
}

.section-title{
text-align:center;
color:#f7c948;
margin:20px 0;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
padding:15px;
}

.card{
background:#102b5e;
padding:12px;
text-align:center;
border-radius:8px;
color:white;
text-decoration:none;
font-weight:bold;
}

.card:hover{
background:#f7c948;
color:black;
}

footer{
text-align:center;
padding:20px;
background:#081f44;
margin-top:20px;
}

footer a{
color:white;
margin:0 10px;
text-decoration:none;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:22px;
text-decoration:none;
}

</style>

</head>

<body>

<header>
<img src="images/logo.png">
RK Album Designing
</header>

<div class="hero">
<img src="images/banner.png">
<h1>We Design Your Memories</h1>
</div>

<h2 class="section-title">Categories</h2>

<div class="grid">
<a class="card" href="#">Wedding</a>
<a class="card" href="#">Engagement</a>
<a class="card" href="#">Haldi</a>
<a class="card" href="#">Pre Wedding</a>
<a class="card" href="#">Birthday</a>
<a class="card" href="#">Baby Shower</a>
<a class="card" href="#">Maternity</a>
<a class="card" href="#">Events</a>
</div>

<footer>
<a href="https://wa.me/918888496535">WhatsApp</a>
<a href="https://instagram.com/rajesh_kusuma7">Instagram</a>
<p>© RK Album Designing</p>
</footer>

<a class="whatsapp" href="https://wa.me/918888496535">💬</a>

</body>
</html>
