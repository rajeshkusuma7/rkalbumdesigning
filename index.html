<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RK Album Designing</title>

<style>

body{
margin:0;
font-family:Arial;
background:#061a3a;
color:white;
overflow-x:hidden;
}

/* HEADER */
header{
display:flex;
align-items:center;
gap:12px;
padding:15px 20px;
background:#081f44;
color:#f7c948;
font-size:22px;
font-weight:bold;
}

header img{
width:50px;
height:50px;
object-fit:cover;
border-radius:6px;
}

/* HERO BANNER */
.hero{
position:relative;
width:100%;
height:420px;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
}

.hero h1{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:42px;
text-shadow:2px 2px 10px black;
}

/* TITLE */
.section-title{
text-align:center;
margin:25px 0;
color:#f7c948;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#102b5e;
padding:15px;
text-align:center;
border-radius:10px;
color:white;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.card:hover{
background:#f7c948;
color:black;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background:#081f44;
margin-top:30px;
}

footer a{
color:white;
margin:10px;
text-decoration:none;
}

</style>

</head>

<body>

<!-- HEADER (LOGO + NAME) -->
<header>
<img src="images/banner.png" alt="logo">
RK Album Designing
</header>

<!-- HERO BANNER -->
<section class="hero">
<img src="images/banner.png" alt="banner">

</section>

<!-- CATEGORIES -->
<h2 class="section-title">Categories</h2>

<div class="grid">

<a class="card" href="wedding.html">Wedding</a>
<a class="card" href="engagement.html">Engagement</a>
<a class="card" href="haldi.html">Haldi</a>
<a class="card" href="prewedding.html">Pre Wedding</a>
<a class="card" href="birthday.html">Birthday</a>
<a class="card" href="babyshower.html">Baby Shower</a>
<a class="card" href="maternity.html">Maternity</a>
<a class="card" href="events.html">Events</a>

</div>

<!-- FOOTER -->
<footer>

<a href="https://wa.me/918886496535">WhatsApp</a>
<a href="https://instagram.com/rajesh_kusuma7">Instagram</a>

<p>© RK Album Designing</p>

</footer>

</body>
</html>
